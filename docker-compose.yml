services:
  postgres:
    image: postgres:16-alpine
    container_name: loteria_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: loteria_analytics
    ports:
      - "5433:5432"
    volumes:
      - loteria_pg_data:/var/lib/postgresql/data

volumes:
  loteria_pg_data:
